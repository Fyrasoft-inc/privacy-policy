<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Account Deletion - Sripuram PRO">
    <title>Account Deletion - Sripuram PRO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">Sripuram PRO</h1>
        </div>
    </header>

    <main class="container">
        <article class="policy-card fade-in">
            <h1 class="policy-title">Account Deletion Request</h1>
            <p class="last-updated">Submit a request to delete your Sripuram PRO account.</p>

            <section class="policy-section">
                <p>We are sorry to see you go! By submitting this form, your account and all associated data will be queued for deletion. This action is irreversible once completed.</p>
                
                <form id="deleteAccountForm" style="margin-top: 30px;">
                    <div id="alertMessage" class="alert"></div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email ID</label>
                        <input type="email" id="email" class="form-input" placeholder="your.email@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="reason" class="form-label">Reason for Deletion (Optional)</label>
                        <textarea id="reason" class="form-input" rows="4" placeholder="Please let us know why you are leaving..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="confirmText" class="form-label">Type "delete my account" to confirm</label>
                        <input type="text" id="confirmText" class="form-input" placeholder="delete my account" required>
                    </div>

                    <button type="submit" class="delete-btn" id="submitBtn">Request Deletion</button>
                    <a href="./pro-privacy-policy.html" class="delete-btn" style="background-color: var(--text-muted); margin-left: 10px;">Cancel</a>
                </form>
            </section>
        </article>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; <span id="year"></span> Sripuram. All rights reserved.</p>
        </div>
    </footer>

    <script src="./deleteaccount.js"></script>
</body>
</html>
